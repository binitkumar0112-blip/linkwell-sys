services:
  - type: web
    name: linkwell-api
    env: python
    plan: free
    region: oregon
    pythonVersion: 3.10
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: ENV
        value: production
      - key: RENDER_FRONTEND_URL
        value: https://your-frontend-url.onrender.com
        sync: false
